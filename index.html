<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 340px;
      height: 240px;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: drag;
      user-select: none;
    }

    .wrap {
      width: 340px;
      height: 240px;
      background: #1a1a1a;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }

    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
      -webkit-app-region: no-drag;
      margin-top: 28px;
    }

    input[type="text"] {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 52px;
      font-weight: 600;
      color: #f0f0f0;
      width: 190px;
      text-align: center;
      letter-spacing: -2px;
      caret-color: #22c55e;
      -moz-appearance: textfield;
    }
    input:disabled { color: #f0f0f0; }

    .sub {
      font-family: system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #444;
      margin-top: -18px;
      text-align: center;
      width: 100%;
    }

    button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 22px;
      color: #888;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 28px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-app-region: no-drag;
    }
    button:hover { background: #333; color: #ccc; }
    button.running {
      border-color: #555;
      color: #aaa;
    }
    button.done {
      background: #14532d;
      border-color: #22c55e;
      color: #22c55e;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #333;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      -webkit-app-region: no-drag;
      letter-spacing: 0;
    }
    .close-btn:hover { color: #888; background: #2a2a2a; }
  </style>
</head>
<body>
<div class="wrap">
  <canvas id="c" width="340" height="240"></canvas>

  <button class="close-btn" id="closeBtn" title="Закрыть">✕</button>

  <div class="center">
    <div>
      <input type="text" inputmode="numeric" id="display" value="25">
      <!-- <p class="sub" id="sublabel">minutes</p> -->
    </div>
    <button id="btn">Start</button>
  </div>
</div>

<script>
// close
document.getElementById('closeBtn').addEventListener('click', () => {
  window.close()
})

const canvas  = document.getElementById('c')
const ctx     = canvas.getContext('2d')
const display = document.getElementById('display')
const btn     = document.getElementById('btn')
// const sub     = document.getElementById('sublabel')

const RAYS      = 60
const CX        = 170
const CY        = 148          // arc center for 240px height window
const R_INNER   = 118
const R_OUTER   = 134
const RAY_W     = 3
const ARC_START = Math.PI      // 9 o'clock (left)
const ARC_SPAN  = Math.PI      // 180° → 3 o'clock (right) through bottom

let totalSecs    = 0
let remaining    = 0
let running      = false
let interval     = null
let inputMinutes = 5
let inputChanged = false       // true when user manually edits the field

// ── colour helpers ──────────────────────────────────────────────
function progressColor(p) {
  // p: 0..1  →  hue 120 (green) → 60 (yellow) → 0 (red)
  const hue = Math.round((1 - p) * 120)
  const sat = 90
  const lig = p < 0.5 ? 45 : 42
  return `hsl(${hue},${sat}%,${lig}%)`
}

// ── draw ────────────────────────────────────────────────────────
function draw(progress) {   // progress 0..1  (1 = full = just started, 0 = done)
  ctx.clearRect(0, 0, 340, 240)

  // how many rays are lit = elapsed fraction
  const elapsed  = 1 - progress          // 0 → 1 as timer counts down
  const litCount = Math.round(elapsed * RAYS)

  for (let i = 0; i < RAYS; i++) {
    const angle = ARC_START + (i / (RAYS - 1)) * ARC_SPAN
    const lit   = i < litCount

    const x1 = CX + Math.cos(angle) * R_INNER
    const y1 = CY + Math.sin(angle) * R_INNER
    const x2 = CX + Math.cos(angle) * R_OUTER
    const y2 = CY + Math.sin(angle) * R_OUTER

    ctx.beginPath()
    ctx.moveTo(x1, y1)
    ctx.lineTo(x2, y2)
    ctx.lineWidth   = RAY_W
    ctx.lineCap     = 'round'
    ctx.strokeStyle = lit ? progressColor(elapsed) : '#3a3a3a'
    ctx.stroke()
  }
}

// ── update display number ────────────────────────────────────────
function updateDisplay(secs) {
  const m = Math.floor(secs / 60)
  const s = secs % 60
  display.value = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0')
}

// ── done ─────────────────────────────────────────────────────────
function onDone() {
  running = false
  clearInterval(interval)
  draw(0)
  display.value  = '00:00'
  display.style.color = '#22c55e'
  // sub.style.color     = '#22c55e'
  // sub.textContent     = 'done'
  btn.textContent     = 'Reset'
  btn.className       = 'done'
  display.disabled    = true
  beep()
}

// ── beep ─────────────────────────────────────────────────────────
function beep() {
  try {
    const ctx2  = new AudioContext()
    const osc   = ctx2.createOscillator()
    const gain  = ctx2.createGain()
    osc.connect(gain)
    gain.connect(ctx2.destination)
    osc.type      = 'sine'
    osc.frequency.setValueAtTime(880, ctx2.currentTime)
    gain.gain.setValueAtTime(0.4, ctx2.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 1.2)
    osc.start(ctx2.currentTime)
    osc.stop(ctx2.currentTime + 1.2)
  } catch(e) {}
}

// ── reset to idle ─────────────────────────────────────────────────
function resetIdle() {
  clearInterval(interval)
  running            = false
  inputChanged       = false
  remaining          = 0
  totalSecs          = 0
  display.disabled   = false
  display.value      = String(inputMinutes).padStart(2, '0') + ':00'
  display.style.color = '#f0f0f0'
  // sub.textContent    = 'minutes'
  // sub.style.color    = '#444'
  btn.textContent    = 'Start'
  btn.className      = ''
  draw(1)
}

// ── btn click ────────────────────────────────────────────────────
btn.addEventListener('click', () => {
  if (btn.textContent === 'Reset') { resetIdle(); return }

  if (!running) {
    // START or RESUME
    if (!inputChanged && remaining > 0 && totalSecs > 0) {
      // resume from paused position
    } else {
      // fresh start
      inputMinutes = Math.max(1, Math.min(99, parseInt(display.value) || 1))
      totalSecs  = inputMinutes * 60
      remaining  = totalSecs
      inputChanged = false
    }
    running = true
    display.disabled = true
    btn.textContent = 'Stop'
    btn.className   = 'running'
    updateDisplay(remaining)
    draw(remaining / totalSecs)

    interval = setInterval(() => {
      remaining--
      if (remaining <= 0) { onDone(); return }
      updateDisplay(remaining)
      draw(remaining / totalSecs)
    }, 1000)

  } else {
    // STOP — keep remaining as-is
    clearInterval(interval)
    running = false
    btn.textContent = 'Start'
    btn.className   = ''
    display.disabled = false
  }
})

// ── input guard ──────────────────────────────────────────────────
display.addEventListener('input', () => {
  let v = parseInt(display.value)
  if (isNaN(v) || v < 1)  v = 1
  if (v > 99) v = 99
  inputMinutes = v
  inputChanged = true
  remaining = 0
  // keep cursor usable — don't rewrite value mid-type
  draw(1)
})
display.addEventListener('blur', () => {
  if (!running) {
    let v = parseInt(display.value)
    if (isNaN(v) || v < 1)  v = 1
    if (v > 99) v = 99
    inputMinutes = v
    display.value = String(v).padStart(2, '0') + ':00'
  }
})

// ── init ─────────────────────────────────────────────────────────
display.value = String(inputMinutes).padStart(2, '0') + ':00'
draw(1)
</script>
</body>
</html>
